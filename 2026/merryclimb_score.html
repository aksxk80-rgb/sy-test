<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>메리클라임 써머 준결승</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 40%, #fdfbfb 100%);
      background-attachment: fixed;
      color: #1e293b;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* 🌊 배경 이모지 캐릭터 스타일 */
    .bg-char {
      position: fixed;
      opacity: 0.3; /* 투명도를 살짝 높여서 잘 보이게 조정 */
      z-index: 0;
      pointer-events: none;
      font-size: 80px; /* 캐릭터 크기 */
      filter: blur(1px); /* 부드럽게 배경 처리 */
    }

    /* 🦈 좌측 상단 상어 */
    .char-shark {
      top: 10%;
      left: -20px;
      transform: rotate(15deg);
    }
    .char-shark::after { content: "🦈"; }

    /* 🐟 우측 상단 개복치(또는 물고기) */
    .char-sunfish {
      top: 20%;
      right: -10px;
      animation: float-slow 4s ease-in-out infinite;
    }
    .char-sunfish::after { content: "🐠"; }

    /* 🐙 좌측 하단 문어 */
    .char-octopus {
      bottom: 15%;
      left: 0px;
      transform: rotate(-10deg);
    }
    .char-octopus::after { content: "🐙"; }

    /* 🦭 우측 하단 물범(또는 고래) */
    .char-seal {
      bottom: 5%;
      right: 10px;
      animation: float-slow 5s ease-in-out infinite reverse;
    }
    .char-seal::after { content: "🐋"; }

    /* 🆙 둥둥 애니메이션 */
    @keyframes float-slow {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    /* 나머지 UI 스타일 (이전과 동일) */
    header {
      padding: 50px 20px 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    header h1 { 
      margin: 0; font-size: 2.2rem; font-weight: 900; color: #ffffff;
      text-shadow: 0 4px 15px rgba(0, 119, 182, 0.3);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 60px;
      position: relative;
      z-index: 1;
    }

    .board-status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ff4d4d;
      font-weight: 800;
      font-size: 0.85rem;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background-color: #ff4d4d;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .main-label { font-size: 1.1rem; font-weight: 800; color: #075985; }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 15px rgba(0, 119, 182, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.6);
      cursor: pointer;
    }

    .rank-1-card { background: #fffbeb !important; border: 3px solid #f59e0b !important; }
    .rank-2-card { background: #f8fafc !important; border: 3px solid #94a3b8 !important; }
    .rank-3-card { background: #fff7ed !important; border: 3px solid #ea580c !important; }

    .card-left { display: flex; align-items: center; gap: 16px; min-width: 0; }
    .rank-badge {
      width: 48px; height: 48px; text-align: center; font-weight: 900;
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      background: white; color: #1e293b; flex-shrink: 0;
    }
    .rank-1-badge, .rank-2-badge, .rank-3-badge { font-size: 1.5rem; }
    .team-name { font-size: 1.1rem; font-weight: 800; color: #0f172a; }
    .team-sub { font-size: 0.8rem; color: #64748b; }
    .card-right { text-align: right; }
    .score { font-weight: 900; font-size: 1.3rem; color: #0284c7; }
    .total-score { font-size: 0.85rem; color: #0f172a; font-weight: 600; }
    .loading { text-align: center; margin-top: 50px; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <div class="background-decorations">
    <div class="bg-char char-shark"></div>
    <div class="bg-char char-sunfish"></div>
    <div class="bg-char char-octopus"></div>
    <div class="bg-char char-seal"></div>
  </div>

  <header>
    <h1>☀️ MERRY CLIMB SUMMER SEMI FINAL</h1>
  </header>

  <div class="container">
    <div class="board-status-bar">
      <div class="main-label">실시간 순위 리더보드</div>
      <div class="live-indicator">
        <div class="live-dot"></div>
        LIVE UPDATING
      </div>
    </div>
    <div id="status" class="loading">바다 친구들과 데이터 불러오는 중...</div>
    <div id="board"></div>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1BgeBpjbcBa3b-k9rBhpygxIYKOgNSH81Z71p1a-D1N8/export?format=csv&gid=914454642";

    async function loadScoreboard() {
      const statusEl = document.getElementById("status");
      const boardEl = document.getElementById("board");
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        let rows = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n")
          .map(r => r.replace(/^\uFEFF/, "").trim())
          .filter(r => r.replace(/,/g, "").trim() !== "");
        const header = rows[0].split(",");
        const dataRows = rows.slice(1).map(r => r.split(","));
        const rankIdx = header.findIndex(h => h.trim() === "팀 순위");
        const nameIdx = header.findIndex(h => h.trim() === "팀명");
        const totalIdx = header.findIndex(h => h.trim() === "총점");

        let items = dataRows.map(cols => {
          const rank = cols[rankIdx]?.trim();
          const name = cols[nameIdx]?.trim();
          const total = cols[totalIdx]?.trim();
          if (!rank || !name) return null;
          return { rank: Number(rank), displayName: name, teamKeyName: name, score: total, total };
        }).filter(Boolean).sort((a, b) => a.rank - b.rank);

        boardEl.innerHTML = "";
        statusEl.style.display = "none";

        items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          let rankBadgeClass = "rank-badge";
          if (item.rank === 1) { card.classList.add("rank-1-card"); rankBadgeClass += " rank-1-badge"; }
          else if (item.rank === 2) { card.classList.add("rank-2-card"); rankBadgeClass += " rank-2-badge"; }
          else if (item.rank === 3) { card.classList.add("rank-3-card"); rankBadgeClass += " rank-3-badge"; }

          card.onclick = () => {
            window.location.href = `/sy-test/2026/merryclimb_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
          };

          let rankBadgeText = item.rank + "위";
          if (item.rank === 1) rankBadgeText = "🥇";
          else if (item.rank === 2) rankBadgeText = "🥈";
          else if (item.rank === 3) rankBadgeText = "🥉";

          card.innerHTML = `
            <div class="card-left">
              <div class="${rankBadgeClass}">${rankBadgeText}</div>
              <div>
                <div class="team-name">${item.displayName}</div>
                <div class="team-sub">팀명: ${item.teamKeyName}</div>
              </div>
            </div>
            <div class="card-right">
              <div class="score">${item.score}</div>
              <div class="total-score">총합 ${item.total}</div>
            </div>
          `;
          boardEl.appendChild(card);
        });
      } catch (err) { statusEl.textContent = "오류 발생: " + err.message; }
    }
    loadScoreboard();
  </script>
</body>
</html>
