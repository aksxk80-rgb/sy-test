<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>메리클라임 써머 준결승</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 40%, #fdfbfb 100%);
      background-attachment: fixed;
      color: #1e293b;
      min-height: 100vh;
    }

    header {
      padding: 40px 20px 20px;
      text-align: center;
    }
    header h1 { 
      margin: 0; 
      font-size: 2rem; 
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 4px 10px rgba(0,0,0,0.15);
      letter-spacing: -1px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    .board-status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ff4d4d;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background-color: #ff4d4d;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .main-label {
      font-size: 1.1rem;
      font-weight: 800;
      color: #075985;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 20px; /* 여백을 조금 더 넓힘 */
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 15px rgba(0, 119, 182, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .card:active { transform: scale(0.98); }

    .rank-1-card { 
      background: #fffbeb !important; 
      border: 3px solid #f59e0b !important; 
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.2);
    }
    .rank-2-card { 
      background: #f8fafc !important; 
      border: 3px solid #94a3b8 !important; 
    }
    .rank-3-card { 
      background: #fff7ed !important; 
      border: 3px solid #ea580c !important; 
    }

    .card-left { display: flex; align-items: center; gap: 16px; min-width: 0; }

    .rank-badge {
      width: 48px;
      height: 48px;
      text-align: center;
      font-weight: 900;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: #1e293b;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .rank-1-badge, .rank-2-badge, .rank-3-badge { font-size: 1.5rem; }

    .team-info { display: flex; flex-direction: column; }
    .team-name { font-size: 1.1rem; font-weight: 800; color: #0f172a; }
    .team-sub { font-size: 0.8rem; color: #64748b; margin-top: 1px; }

    .card-right { text-align: right; }
    /* ⭐ 총합 텍스트 스타일 강조 */
    .total-score { 
      font-size: 1.2rem; 
      color: #0284c7; 
      font-weight: 900; 
    }
    
    .loading { text-align: center; font-size: 1rem; margin-top: 50px; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>☀️ MERRY CLIMB SUMMER SEMI FINAL</h1>
  </header>

  <div class="container">
    <div class="board-status-bar">
      <div class="main-label">준결승 실시간 순위</div>
      <div class="live-indicator">
        <div class="live-dot"></div>
        LIVE UPDATING
      </div>
    </div>

    <div id="status" class="loading">데이터를 불러오고 있습니다...</div>
    <div id="board"></div>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1BgeBpjbcBa3b-k9rBhpygxIYKOgNSH81Z71p1a-D1N8/export?format=csv&gid=914454642";

    async function loadScoreboard() {
      const statusEl = document.getElementById("status");
      const boardEl = document.getElementById("board");

      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();

        let rows = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n")
          .map(r => r.replace(/^\uFEFF/, "").trim())
          .filter(r => r.replace(/,/g, "").trim() !== "");

        const header = rows[0].split(",");
        const dataRows = rows.slice(1).map(r => r.split(","));

        const rankIdx = header.findIndex(h => h.trim() === "팀 순위");
        const nameIdx = header.findIndex(h => h.trim() === "팀명");
        const totalIdx = header.findIndex(h => h.trim() === "총점");

        let items = dataRows.map(cols => {
          const rank = cols[rankIdx]?.trim();
          const name = cols[nameIdx]?.trim();
          const total = cols[totalIdx]?.trim();
          if (!rank || !name) return null;
          return { rank: Number(rank), displayName: name, teamKeyName: name, total: total || "0" };
        }).filter(Boolean).sort((a, b) => a.rank - b.rank);

        boardEl.innerHTML = "";
        statusEl.style.display = "none";

        items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          
          let rankBadgeClass = "rank-badge";
          if (item.rank === 1) {
            card.classList.add("rank-1-card");
            rankBadgeClass += " rank-1-badge";
          } else if (item.rank === 2) {
            card.classList.add("rank-2-card");
            rankBadgeClass += " rank-2-badge";
          } else if (item.rank === 3) {
            card.classList.add("rank-3-card");
            rankBadgeClass += " rank-3-badge";
          }

          card.onclick = () => {
            window.location.href = `/sy-test/2026/merryclimb_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
          };

          let rankBadgeText = item.rank + "위";
          if (item.rank === 1) rankBadgeText = "🥇";
          else if (item.rank === 2) rankBadgeText = "🥈";
          else if (item.rank === 3) rankBadgeText = "🥉";

          card.innerHTML = `
            <div class="card-left">
              <div class="${rankBadgeClass}">${rankBadgeText}</div>
              <div class="team-info">
                <div class="team-name">${item.displayName}</div>
                <div class="team-sub">팀명: ${item.teamKeyName}</div>
              </div>
            </div>
            <div class="card-right">
              <div class="total-score">총합 ${item.total}</div>
            </div>
          `;
          boardEl.appendChild(card);
        });
      } catch (err) {
        statusEl.textContent = "오류 발생: " + err.message;
      }
    }
    loadScoreboard();
    // 실시간 업데이트를 위해 30초마다 갱신 추가
    setInterval(loadScoreboard, 30000);
  </script>
</body>
</html>
