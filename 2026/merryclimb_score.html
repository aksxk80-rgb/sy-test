<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>메리클라임 써머 준결승</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 폰트 및 기본 스타일 */
    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 40%, #fdfbfb 100%);
      background-attachment: fixed;
      color: #1e293b;
      min-height: 100vh;
      overflow-x: hidden; /* 캐릭터가 화면 밖으로 나가도 스크롤바 안 생기게 */
      position: relative; /* 캐릭터 배치의 기준 */
    }

    /* 🌊 배경 캐릭터 데코레이션 스타일 */
    .bg-char {
      position: fixed; /* 스크롤해도 고정 */
      opacity: 0.2; /* 👻 중요: 은은하게 배경으로 처리 (0.1 ~ 0.3 추천) */
      z-index: 0; /* 리더보드 뒤로 배치 */
      pointer-events: none; /* 클릭 안 되게 */
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* 🦈 좌측 상단 상어 */
    .char-shark {
      top: 50px;
      left: -20px;
      width: 150px;
      height: 150px;
      background-image: url('https://i.imgur.com/8cTzXqK.png'); /* 귀여운 상어 일러스트 */
    }

    /* 🐟 우측 상단 개복치 (둥둥 애니메이션) */
    .char-sunfish {
      top: 100px;
      right: -30px;
      width: 120px;
      height: 120px;
      background-image: url('https://i.imgur.com/rXyN5Vp.png'); /* 귀여운 개복치 */
      animation: float-slow 4s ease-in-out infinite;
    }

    /* 🐙 좌측 하단 문어 */
    .char-octopus {
      bottom: 60px;
      left: -10px;
      width: 130px;
      height: 130px;
      background-image: url('https://i.imgur.com/9C44Hl8.png'); /* 귀여운 문어 */
    }

    /* 🦭 우측 하단 물범 (둥둥 애니메이션) */
    .char-seal {
      bottom: 30px;
      right: 10px;
      width: 140px;
      height: 140px;
      background-image: url('https://i.imgur.com/V9z4v5g.png'); /* 귀여운 물범 */
      animation: float-slow 5s ease-in-out infinite reverse;
    }

    /* 🆙 미세한 둥둥 애니메이션 */
    @keyframes float-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 헤더 스타일 */
    header {
      padding: 50px 20px 20px;
      text-align: center;
      position: relative;
      z-index: 1; /* 캐릭터보다 위로 */
    }
    header h1 { 
      margin: 0; 
      font-size: 2.2rem; 
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 4px 15px rgba(0, 119, 182, 0.3);
      letter-spacing: -1px;
    }

    /* 컨테이너 및 리더보드 스타일 (이전과 동일) */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 60px;
      position: relative;
      z-index: 1; /* 캐릭터보다 위로 */
    }

    .board-status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ff4d4d;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background-color: #ff4d4d;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .main-label {
      font-size: 1.1rem;
      font-weight: 800;
      color: #075985;
    }

    .card {
      background: rgba(255, 255, 255, 0.9); /* 배경 캐릭터가 살짝 보이도록 투명도 조절 */
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 15px rgba(0, 119, 182, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.6);
      cursor: pointer;
    }

    .rank-1-card { 
      background: #fffbeb !important;
      border: 3px solid #f59e0b !important;
      box-shadow: 0 8px 25px rgba(245, 158, 11, 0.25);
    }
    .rank-2-card { 
      background: #f8fafc !important;
      border: 3px solid #94a3b8 !important;
    }
    .rank-3-card { 
      background: #fff7ed !important;
      border: 3px solid #ea580c !important;
    }

    .card-left { display: flex; align-items: center; gap: 16px; min-width: 0; }

    .rank-badge {
      width: 48px;
      height: 48px;
      text-align: center;
      font-weight: 900;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: #1e293b;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .rank-1-badge, .rank-2-badge, .rank-3-badge { font-size: 1.5rem; }

    .team-info { display: flex; flex-direction: column; }
    .team-name { font-size: 1.1rem; font-weight: 800; color: #0f172a; }
    .team-sub { font-size: 0.8rem; color: #64748b; margin-top: 1px; }

    .card-right { text-align: right; }
    .score { font-weight: 900; font-size: 1.3rem; color: #0284c7; }
    .score-label { font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase; }
    .total-score { font-size: 0.85rem; margin-top: 2px; color: #0f172a; font-weight: 600; }
    
    .loading { text-align: center; font-size: 1rem; margin-top: 50px; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <div class="background-decorations">
    <div class="bg-char char-shark"></div>
    <div class="bg-char char-sunfish"></div>
    <div class="bg-char char-octopus"></div>
    <div class="bg-char char-seal"></div>
  </div>

  <header>
    <h1>☀️ MERRY CLIMB SUMMER</h1>
  </header>

  <div class="container">
    <div class="board-status-bar">
      <div class="main-label">실시간 순위 리더보드</div>
      <div class="live-indicator">
        <div class="live-dot"></div>
        LIVE UPDATING
      </div>
    </div>

    <div id="status" class="loading">바다 친구들과 데이터 불러오는 중...</div>
    <div id="board"></div>
  </div>

  <script>
    // 스크립트 로직은 이전과 동일 (가독성을 위해 생략, 실제 적용 시에는 이전 코드를 그대로 사용하세요)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1BgeBpjbcBa3b-k9rBhpygxIYKOgNSH81Z71p1a-D1N8/export?format=csv&gid=914454642";

    async function loadScoreboard() {
      const statusEl = document.getElementById("status");
      const boardEl = document.getElementById("board");

      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();

        let rows = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n")
          .map(r => r.replace(/^\uFEFF/, "").trim())
          .filter(r => r.replace(/,/g, "").trim() !== "");

        const header = rows[0].split(",");
        const dataRows = rows.slice(1).map(r => r.split(","));

        const rankIdx = header.findIndex(h => h.trim() === "팀 순위");
        const nameIdx = header.findIndex(h => h.trim() === "팀명");
        const totalIdx = header.findIndex(h => h.trim() === "총점");

        let items = dataRows.map(cols => {
          const rank = cols[rankIdx]?.trim();
          const name = cols[nameIdx]?.trim();
          const total = cols[totalIdx]?.trim();
          if (!rank || !name) return null;
          return { rank: Number(rank), displayName: name, teamKeyName: name, score: total, total };
        }).filter(Boolean).sort((a, b) => a.rank - b.rank);

        boardEl.innerHTML = "";
        statusEl.style.display = "none";

        items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          
          let rankBadgeClass = "rank-badge";
          if (item.rank === 1) {
            card.classList.add("rank-1-card");
            rankBadgeClass += " rank-1-badge";
          } else if (item.rank === 2) {
            card.classList.add("rank-2-card");
            rankBadgeClass += " rank-2-badge";
          } else if (item.rank === 3) {
            card.classList.add("rank-3-card");
            rankBadgeClass += " rank-3-badge";
          }

          card.onclick = () => {
            window.location.href = `/sy-test/2026/merryclimb_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
          };

          let rankBadgeText = item.rank + "위";
          if (item.rank === 1) rankBadgeText = "🥇";
          else if (item.rank === 2) rankBadgeText = "🥈";
          else if (item.rank === 3) rankBadgeText = "🥉";

          card.innerHTML = `
            <div class="card-left">
              <div class="${rankBadgeClass}">${rankBadgeText}</div>
              <div class="team-info">
                <div class="team-name">${item.displayName}</div>
                <div class="team-sub">팀명: ${item.teamKeyName}</div>
              </div>
            </div>
            <div class="card-right">
              <div class="score">${item.score}</div>
              <div class="score-label">TEAM SCORE</div>
              <div class="total-score">총합 ${item.total}</div>
            </div>
          `;
          boardEl.appendChild(card);
        });
      } catch (err) {
        statusEl.textContent = "오류 발생: " + err.message;
      }
    }
    loadScoreboard();
  </script>
</body>
</html>
