<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>메리클라임 써머 준결승</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 🌊 사용자 이미지를 fixed 배경으로 설정 */
    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      margin: 0;
      background-image: url('image_0.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center top;
      color: #334155; /* 데이터 텍스트 색상을 어두운 색으로 */
    }

    /* 🏖️ 헤더 스타일: 사용자 이미지 제목 스타일 재현 */
    header {
      padding: 40px 20px 10px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2.2rem;
      color: #fbbf24; /* 노란색 */
      text-shadow: 0 4px 10px rgba(0,0,0,0.2);
      -webkit-text-stroke: 1.5px #111827; /* 어두운 테두리 */
    }
    header p {
      margin: 4px 0 0;
      font-size: 1rem;
      color: #ffffff; /* 흰색 */
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    }
    
    /* 🧗 리더보드 컨테이너: 암벽 오른쪽에 배치 */
    .container {
      width: 300px; /* 너비 제한 */
      margin-left: calc(100% - 300px); /* 오른쪽에 배치 */
      padding: 12px 12px 32px;
      position: relative;
    }
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0 12px;
      font-size: 0.95rem;
      color: #ffffff; /* 흰색 */
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    }
    
    /* 🏖️ 카드 스타일: 투명 오버레이로 일러스트 배경이 보이도록 */
    .card {
      background: rgba(255, 255, 255, 0.8); /* 흰색 투명 배경 */
      backdrop-filter: blur(10px); /* 블러 효과 */
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 20px rgba(0, 119, 182, 0.1);
      border: 1.5px solid rgba(0, 119, 182, 0.2);
      cursor: pointer;
    }

    /* 🏆 상위권 카드 테두리 더 진하게 강조 (이미지 색상 사용) */
    .rank-1-card { border: 3px solid #f59e0b !important; } /* 골드 */
    .rank-2-card { border: 3px solid #94a3b8 !important; } /* 다크실버 */
    .rank-3-card { border: 3px solid #0369a1 !important; } /* 청록색 */

    .card-left { display: flex; align-items: center; gap: 16px; min-width: 0; }
    
    /* 🏅 순위 배지 디자인: 이미지 이모지 유지 */
    .rank-badge {
      width: 48px;
      height: 48px;
      text-align: center;
      font-weight: 800;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #1e293b;
      border: 1.5px solid rgba(0, 119, 182, 0.2);
      flex-shrink: 0;
    }

    .rank-1-badge, .rank-2-badge, .rank-3-badge {
      font-size: 1.5rem;
    }

0   .team-name { font-size: 1.1rem; font-weight: 700; color: #0f172a; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; max-width: 150px; }
    .team-sub { font-size: 0.8rem; color: #64748b; margin-top: 1px; }
    
    .card-right { text-align: right; font-size: 0.9rem; flex-shrink: 0; }
    .score { font-weight: 900; font-size: 1.3rem; color: #0284c7; } /* 청록색 */
    .total-score { font-size: 0.85rem; margin-top: 2px; color: #111827; font-weight: 600; }
    .loading { text-align: center; font-size: 1rem; margin-top: 50px; color: #ffffff; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>MERRY CLIMB SUMMER</h1>
    <p>실시간 팀 순위 레이스</p>
  </header>

  <div class="container">
    <div class="board-header">
      <span>실시간 순위 리더보드</span>
      <span style="font-size: 0.85rem; color: #fbbf24; font-weight: 700;">● LIVE UPDATING</span>
    </div>
    <div id="status" class="loading">데이터 불러오는 중...</div>
    <div id="board"></div>
  </div>

  <script>
    // 스크립트 로직은 그대로 유지
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1BgeBpjbcBa3b-k9rBhpygxIYKOgNSH81Z71p1a-D1N8/export?format=csv&gid=914454642";

    async function loadScoreboard() {
      const statusEl = document.getElementById("status");
      const boardEl = document.getElementById("board");

      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();

        let rows = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n")
          .map(r => r.replace(/^\uFEFF/, "").trim())
          .filter(r => r.replace(/,/g, "").trim() !== "");

        const header = rows[0].split(",");
        const dataRows = rows.slice(1).map(r => r.split(","));

        const rankIdx = header.findIndex(h => h.trim() === "팀 순위");
        const nameIdx = header.findIndex(h => h.trim() === "팀명");
        const totalIdx = header.findIndex(h => h.trim() === "총점");

        let items = dataRows.map(cols => {
          const rank = cols[rankIdx]?.trim();
          const name = cols[nameIdx]?.trim();
          const total = cols[totalIdx]?.trim();
          if (!rank || !name) return null;
          return { rank: Number(rank), displayName: name, teamKeyName: name, score: total, total };
        }).filter(Boolean).sort((a, b) => a.rank - b.rank);

        boardEl.innerHTML = "";
        statusEl.style.display = "none";

        items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          
          let rankBadgeClass = "rank-badge";
          if (item.rank === 1) {
            card.classList.add("rank-1-card");
            rankBadgeClass += " rank-1-badge";
          } else if (item.rank === 2) {
            card.classList.add("rank-2-card");
            rankBadgeClass += " rank-2-badge";
          } else if (item.rank === 3) {
            card.classList.add("rank-3-card");
            rankBadgeClass += " rank-3-badge";
          }

          card.onclick = () => {
            window.location.href = `/sy-test/2026/merryclimb_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
          };

          let rankBadgeText = item.rank + "위";
          if (item.rank === 1) rankBadgeText = "🥇";
          else if (item.rank === 2) rankBadgeText = "🥈";
          else if (item.rank === 3) rankBadgeText = "🥉";

          card.innerHTML = `
            <div class="card-left">
              <div class="${rankBadgeClass}">${rankBadgeText}</div>
              <div>
                <div class="team-name">${item.displayName}</div>
                <div class="team-sub">팀명: ${item.teamKeyName}</div>
              </div>
            </div>
            <div class="card-right">
              <div class="score">${item.score}</div>
              <div class="total-score">총점 ${item.total}</div>
            </div>
          `;
          boardEl.appendChild(card);
        });
      } catch (err) {
        statusEl.textContent = "오류 발생: " + err.message;
      }
    }
    loadScoreboard();
  </script>
</body>
</html>
