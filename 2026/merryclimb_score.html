<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>메리클라임 써머 준결승</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 🌊 여름 해변 테마 배경 */
    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 40%, #fdfbfb 100%);
      background-attachment: fixed;
      color: #1e293b;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 🌊 애니메이션 파도 효과 */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://www.transparenttextures.com/patterns/cubes.png'); /* 미세한 질감 */
      opacity: 0.1;
      pointer-events: none;
    }

    header {
      padding: 32px 20px;
      text-align: center;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    header h1 { 
      margin: 0; 
      font-size: 1.8rem; 
      letter-spacing: -0.5px;
      font-weight: 800;
    }
    header p { margin: 8px 0 0; font-size: 0.95rem; opacity: 0.9; }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 12px 16px 60px;
      position: relative;
      z-index: 1;
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 4px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #0369a1;
    }

    /* 🏖️ 카드 디자인: 글래스모피즘 스타일 */
    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 24px rgba(0, 119, 182, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.2s ease;
      cursor: pointer;
    }
    .card:active { transform: scale(0.98); }

    /* 🏆 상위권 강조 효과 (여름 보석 느낌) */
    .rank-1-card { 
      background: rgba(255, 250, 230, 0.85) !important;
      border: 2px solid #fbbf24 !important; 
    }
    .rank-2-card { border: 2px solid #cbd5e1 !important; }
    .rank-3-card { border: 2px solid #fdba74 !important; }

    .card-left { display: flex; align-items: center; gap: 16px; min-width: 0; }

    /* 🏅 순위 배지 */
    .rank-badge {
      width: 48px;
      height: 48px;
      text-align: center;
      font-weight: 800;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: #334155;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      flex-shrink: 0;
      font-size: 0.9rem;
    }

    .rank-1-badge, .rank-2-badge, .rank-3-badge {
      font-size: 1.4rem;
      background: #ffffff;
    }

    .team-name { font-size: 1.05rem; font-weight: 700; color: #0f172a; }
    .team-sub { font-size: 0.8rem; color: #64748b; margin-top: 2px; }

    .card-right { text-align: right; flex-shrink: 0; }
    .score { font-weight: 800; font-size: 1.25rem; color: #0284c7; }
    .score-label { font-size: 0.75rem; color: #64748b; font-weight: 600; }
    .total-score { font-size: 0.8rem; margin-top: 2px; color: #94a3b8; }
    
    .loading { text-align: center; font-size: 1rem; margin-top: 40px; color: #0369a1; font-weight: 500; }

    /* 푸터 장식 (파도 느낌) */
    .ocean-floor {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      height: 100px;
      background: linear-gradient(to top, rgba(255,255,255,0.8), transparent);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>☀️ MERRY CLIMB SUMMER</h1>
    <p>한여름의 뜨거운 준결승 레이스</p>
  </header>

  <div class="container">
    <div class="board-header">
      <span>실시간 순위 리더보드</span>
      <span style="font-size: 0.8rem; color: #0ea5e9;">● LIVE UPDATING</span>
    </div>
    <div id="status" class="loading">파도 타고 데이터 불러오는 중... 🌊</div>
    <div id="board"></div>
  </div>

  <div class="ocean-floor"></div>

  <script>
    // CSV URL 및 로직은 기존과 동일하게 유지
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1BgeBpjbcBa3b-k9rBhpygxIYKOgNSH81Z71p1a-D1N8/export?format=csv&gid=914454642";

    async function loadScoreboard() {
      const statusEl = document.getElementById("status");
      const boardEl = document.getElementById("board");

      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();

        let rows = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n")
          .map(r => r.replace(/^\uFEFF/, "").trim())
          .filter(r => r.replace(/,/g, "").trim() !== "");

        const header = rows[0].split(",");
        const dataRows = rows.slice(1).map(r => r.split(","));

        const rankIdx = header.findIndex(h => h.trim() === "팀 순위");
        const nameIdx = header.findIndex(h => h.trim() === "팀명");
        const totalIdx = header.findIndex(h => h.trim() === "총점");

        let items = dataRows.map(cols => {
          const rank = cols[rankIdx]?.trim();
          const name = cols[nameIdx]?.trim();
          const total = cols[totalIdx]?.trim();
          if (!rank || !name) return null;
          return { rank: Number(rank), displayName: name, teamKeyName: name, score: total, total };
        }).filter(Boolean).sort((a, b) => a.rank - b.rank);

        boardEl.innerHTML = "";
        statusEl.style.display = "none";

        items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          
          let rankBadgeClass = "rank-badge";
          if (item.rank === 1) {
            card.classList.add("rank-1-card");
            rankBadgeClass += " rank-1-badge";
          } else if (item.rank === 2) {
            card.classList.add("rank-2-card");
            rankBadgeClass += " rank-2-badge";
          } else if (item.rank === 3) {
            card.classList.add("rank-3-card");
            rankBadgeClass += " rank-3-badge";
          }

          card.onclick = () => {
            window.location.href = `/sy-test/2026/merryclimb_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
          };

          let rankBadgeText = item.rank + "위";
          if (item.rank === 1) rankBadgeText = "🥇";
          else if (item.rank === 2) rankBadgeText = "🥈";
          else if (item.rank === 3) rankBadgeText = "🥉";

          card.innerHTML = `
            <div class="card-left">
              <div class="${rankBadgeClass}">${rankBadgeText}</div>
              <div>
                <div class="team-name">${item.displayName}</div>
                <div class="team-sub">팀명: ${item.teamKeyName}</div>
              </div>
            </div>
            <div class="card-right">
              <div class="score">${item.score}</div>
              <div class="score-label">TEAM SCORE</div>
              <div class="total-score">총합: ${item.total}</div>
            </div>
          `;
          boardEl.appendChild(card);
        });
      } catch (err) {
        statusEl.textContent = "오류 발생: " + err.message;
      }
    }
    loadScoreboard();
  </script>
</body>
</html>
