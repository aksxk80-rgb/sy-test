<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>메리클라임 써머 결승</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0b1020; color: #f5f5f5; }
    header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); background: linear-gradient(135deg, #1f2937, #111827); text-align: center; }
    header h1 { margin: 0; font-size: 1.4rem; }
    
    .container { max-width: 600px; margin: 0 auto; padding: 12px 12px 32px; }
    .card { background: rgba(17,24,39,0.95); border-radius: 10px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(148,163,184,0.25); cursor: pointer; }

    /* 💡 1, 2, 3위 외곽선 두께 3px 및 색상 강조 */
    .rank-1-card { border: 3px solid #fbbf24 !important; }
    .rank-2-card { border: 3px solid #cbd5e1 !important; }
    .rank-3-card { border: 3px solid #f97316 !important; }

    .card-left { display: flex; align-items: center; gap: 15px; min-width: 0; }
    
    /* 💡 순위 배지 디자인 조정 */
    .rank-badge {
      width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: #1e293b; color: #e5e7eb; border: 1px solid rgba(75,85,99,0.9); flex-shrink: 0;
      /* 💡 요청 반영: 4위 이하 순위 글씨 크기 축소 */
      font-size: 0.85rem; 
    }

    /* 🥇, 🥈, 🥉 메달 이모지 크기 */
    .rank-1-badge, .rank-2-badge, .rank-3-badge { font-size: 1.1rem; }

    .team-name { font-size: 1rem; font-weight: 600; color: #ffffff; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; max-width: 170px; }
    .team-sub { font-size: 0.75rem; color: #9ca3af; margin-top: 2px; }
    .score { font-weight: 700; font-size: 1.1rem; color: #fbbf24; text-align: right; }
    .score-label { font-size: 0.72rem; color: #9ca3af; text-align: right; }
    .loading { text-align: center; font-size: 0.9rem; margin-top: 50px; color: #9ca3af; }
  </style>
</head>
<body>
  <header>
    <h1>메리클라임 써머 결승</h1>
  </header>
  <div class="container">
    <div id="status" class="loading">데이터 불러오는 중...</div>
    <div id="board"></div>
  </div>

  <script>
    // ✅ 내보내기용 URL (매니저님 시트 ID 적용)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1kvBovpQTtlSROqo8euDIVurr8v5MTKiQBd4-gFyXHe4/export?format=csv&gid=914454642";

    async function loadScoreboard() {
      const statusEl = document.getElementById("status");
      const boardEl = document.getElementById("board");

      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error("fetch 실패");
        const text = await res.text();

        let rows = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n")
          .map(r => r.replace(/^\uFEFF/, "").trim())
          .filter(r => r.length > 5);

        const header = rows[0].split(",");
        const dataRows = rows.slice(1).map(r => r.split(","));

        // 컬럼 인덱스 찾기 (시트 헤더명과 일치해야 함)
        const rankIdx = header.findIndex(h => h.includes("순위"));
        const nameIdx = header.findIndex(h => h.includes("팀명"));
        const totalIdx = header.findIndex(h => h.includes("총점"));

        let items = dataRows.map(cols => {
          const rank = cols[rankIdx]?.trim();
          const name = cols[nameIdx]?.trim();
          const total = cols[totalIdx]?.trim();
          if (!rank || !name) return null;
          return { rank: Number(rank), displayName: name, teamKeyName: name, score: total };
        }).filter(Boolean).sort((a, b) => a.rank - b.rank);

        boardEl.innerHTML = "";
        statusEl.style.display = "none";

        items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          let badgeClass = "rank-badge";
          let badgeText = item.rank + "위";

          if (item.rank === 1) { card.classList.add("rank-1-card"); badgeClass += " rank-1-badge"; badgeText = "🥇"; }
          else if (item.rank === 2) { card.classList.add("rank-2-card"); badgeClass += " rank-2-badge"; badgeText = "🥈"; }
          else if (item.rank === 3) { card.classList.add("rank-3-card"); badgeClass += " rank-3-badge"; badgeText = "🥉"; }

          card.onclick = () => {
            window.location.href = `/sy-test/2026/merryclimb_final_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
          };

          card.innerHTML = `
            <div class="card-left">
              <div class="${badgeClass}">${badgeText}</div>
              <div>
                <div class="team-name">${item.displayName}</div>
                <div class="team-sub">팀명: ${item.teamKeyName}</div>
              </div>
            </div>
            <div>
              <div class="score">${item.score}</div>
              <div class="score-label">팀 점수</div>
            </div>
          `;
          boardEl.appendChild(card);
        });
      } catch (err) {
        statusEl.textContent = "데이터 로드 실패: 웹 게시 설정을 확인하세요.";
        console.error(err);
      }
    }
    loadScoreboard();
  </script>
</body>
</html>
