<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>메리클라임 써머 결승</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Round:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ✅ body 스타일 수정: 배경 이미지 및 카드 가독성 최적화 */
body { 
  font-family: 'Nanum Gothic Round', sans-serif; 
  margin: 0; 
  
  /* 🖼️ 배경 이미지 설정 */
  background-color: #0284c7; /* 이미지가 안 나올 때나 모바일 여백용 기본 파란색 */
  background-image: url('bg.png'); /* 이미지 파일명 확인 필수! */
  
  /* 🛑 난잡한 반복 문제 해결 */
  background-repeat: no-repeat; /* 바둑판처럼 반복하지 않음 */
  
  /* 📱 모바일 및 전체 화면 최적화 */
  background-size: cover; /* 화면에 꽉 차게 자동으로 크기 조절 (가장 중요) */
  background-position: center; /* 이미지를 가로/세로 가운데 정렬 */
  background-attachment: fixed; /* 스크롤해도 배경은 고정 (고급스러운 느낌) */
  
  color: #1e293b; 
  min-height: 100vh; 
}

/* ✅ 카드 디자인: 배경이 화려할 때 가독성을 위해 불투명도 및 흐림 효과 강화 */
.card { 
  /* 배경 불투명도를 살짝 높이고, 흐림 효과를 강화해서 텍스트를 보호 */
  background: rgba(255, 255, 255, 0.9); /* 90% 불투명도 */
  backdrop-filter: blur(12px); /* 뒤 배경 흐림 효과 강화 */
  
  border-radius: 20px; 
  padding: 18px 20px; 
  margin-bottom: 14px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  
  /* 그림자를 더 깊게 줘서 카드가 배경 위로 떠 있는 느낌 강조 */
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2); 
  
  border: 1px solid rgba(255, 255, 255, 0.5); 
  transition: all 0.2s ease; 
  cursor: pointer; 
}

/* ✅ 1,2,3위 카드 포인트 색상 및 가독성 강화 */
.rank-1-card { border: 3px solid #fbbf24 !important; background: rgba(255, 253, 240, 0.98) !important; }
.rank-2-card { border: 3px solid #cbd5e1 !important; background: rgba(248, 250, 252, 0.98) !important; }
.rank-3-card { border: 3px solid #f97316 !important; background: rgba(255, 247, 237, 0.98) !important; }

/* ✅ 제목 색상: 배경이 파란색이므로 흰색 계열 유지 */
.main-label { font-size: 1.1rem; font-weight: 800; color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }

/* ✅ 카드 내 가독성: 텍스트 색상을 더 진하게 변경 */
.team-name { font-size: 1.2rem; font-weight: 800; color: #081125; }
.t-score { font-size: 1.6rem; color: #081125; }
.total-score-label { color: #57657d; }
    
    .loading { text-align: center; font-size: 1.1rem; margin-top: 60px; color: #ffffff; font-weight: 700; }
    .no-result { text-align: center; padding: 40px; color: #ffffff; font-weight: 700; }
  </style>
</head>
<body>
  <header>
    <h1>🏆 MERRY CLIMB SUMMER FINAL</h1>
  </header>

  <div class="container">
    <div class="search-wrapper">
      <input type="text" id="teamSearch" class="search-input" placeholder="우리 팀 이름을 검색해보세요!" oninput="filterTeams()">
    </div>

    <div class="board-status-bar">
      <div class="main-label">결승 실시간 순위</div>
      <div class="live-indicator">
        <div class="live-dot"></div> LIVE UPDATING
      </div>
    </div>

    <div id="status" class="loading">결승전 데이터를 불러오고 있습니다...</div>
    <div id="board"></div>
  </div>

  <script>
  const SPREADSHEET_ID = "11yRg8F7b2yIRZFRvfsvzOjHJWxE5tecqYTPkCwEgJqo";
  const RANK_GID = "768457891";
  const CSV_URL_RANK = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${RANK_GID}`;

  let allFinalists = [];

  async function loadScoreboard() {
    try {
      const cacheBuster = new Date().getTime();
      const response = await fetch(`${CSV_URL_RANK}&cache=${cacheBuster}`);
      const textRank = await response.text();

      let rowsRank = textRank.replace(/\r/g, "").split("\n")
        .map(r => r.replace(/^\uFEFF/, "").trim())
        .filter(r => r.length > 5);

      const header = rowsRank[0].split(",");
      const rankIdx = header.findIndex(h => h.includes("순위"));
      const nameIdx = header.findIndex(h => h.includes("팀명"));
      const tIdx = header.findIndex(h => h.includes("T"));
      const totalIdx = header.findIndex(h => h.includes("총점"));

      const dataRows = rowsRank.slice(1).map(r => r.split(","));

      allFinalists = dataRows.map(cols => {
        const rank = cols[rankIdx]?.trim();
        const teamName = cols[nameIdx]?.trim();
        const tValue = cols[tIdx]?.trim() || "0";
        const total = cols[totalIdx]?.trim() || "0";

        if (!rank || !teamName) return null;
        
        return { 
          rank: Number(rank), 
          displayName: teamName, 
          total: total, 
          tValue: tValue,
          teamKeyName: teamName 
        };
      }).filter(Boolean).sort((a, b) => a.rank - b.rank);

      document.getElementById("status").style.display = "none";
      filterTeams(); 

    } catch (err) {
      document.getElementById("status").textContent = "데이터 갱신 중...";
      console.error(err);
    }
  }

  function filterTeams() {
    const searchTerm = document.getElementById("teamSearch").value.toLowerCase().replace(/\s+/g, "");
    const boardEl = document.getElementById("board");
    
    const filtered = allFinalists.filter(team => 
      team.displayName.toLowerCase().replace(/\s+/g, "").includes(searchTerm)
    );

    boardEl.innerHTML = "";
    if (filtered.length === 0) {
      boardEl.innerHTML = `<div class="no-result">일치하는 팀이 없습니다. 🏆</div>`;
      return;
    }

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      
      if (item.rank === 1) card.classList.add("rank-1-card");
      else if (item.rank === 2) card.classList.add("rank-2-card");
      else if (item.rank === 3) card.classList.add("rank-3-card");

      let badgeClass = "rank-badge";
      let badgeText = item.rank + "위";
      if (item.rank === 1) { badgeClass += " rank-1-badge"; badgeText = "🥇"; }
      else if (item.rank === 2) { badgeClass += " rank-2-badge"; badgeText = "🥈"; }
      else if (item.rank === 3) { badgeClass += " rank-3-badge"; badgeText = "🥉"; }

      card.onclick = () => {
        window.location.href = `merryclimb_final_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
      };

      card.innerHTML = `
        <div class="card-left">
          <div class="${badgeClass}">${badgeText}</div>
          <div class="team-info">
            <div class="team-name">${item.displayName}</div>
          </div>
        </div>
        <div class="card-right">
          <div class="t-score">${item.tValue} T</div>
          <div class="total-score-label">총점: ${item.total}</div>
        </div>
      `;
      boardEl.appendChild(card);
    });
  }

  loadScoreboard();
  setInterval(loadScoreboard, 30000);
</script>
</body>
</html>
