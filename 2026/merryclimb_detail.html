<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>팀 상세 정보</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 40%, #fdfbfb 100%);
      background-attachment: fixed;
      color: #1e293b;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .header-container {
      max-width: 1000px;
      margin: 20px auto 10px;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 4px 10px rgba(0,0,0,0.15);
      margin-bottom: 8px;
    }

    .team-total-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 15px 20px;
      display: inline-block;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 119, 182, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .team-total-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 4px;
    }

    .team-total-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: #0284c7;
    }

    /* 📊 테이블 스타일 강화 */
    .table-wrapper {
      max-width: 1100px; /* 전체 너비 확장 */
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.6);
      overflow-x: auto; /* 가로 스크롤 허용 */
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: auto; /* 열 너비 자동 조절 */
    }

    th, td {
      padding: 12px 6px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      border-right: 1px solid rgba(0, 0, 0, 0.02);
      white-space: nowrap; /* 텍스트 줄바꿈 방지 */
    }

    th {
      background: rgba(7, 89, 133, 0.03);
      color: #075985;
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      border-bottom: 2px solid rgba(7, 89, 133, 0.1);
    }

    /* 📏 구체적인 열 크기 조절 */
    th:nth-child(1), td:nth-child(1) { min-width: 85px; font-weight: 800; color: #0f172a; } /* 이름 */
    th:nth-child(2), td:nth-child(2) { min-width: 45px; color: #64748b; } /* 번호 */
    
    /* 섹터 점수 열들 */
    th:not(:first-child):not(:last-child), 
    td:not(:first-child):not(:last-child) {
      min-width: 42px;
    }

    /* 마지막 총점 열 강조 */
    th:last-child, td:last-child {
      min-width: 80px;
      background: rgba(2, 132, 199, 0.06);
      color: #0284c7;
      font-weight: 800;
      border-right: none;
    }

    tr:hover td {
      background: rgba(7, 89, 133, 0.02);
    }

    .loading { text-align: center; margin-top: 60px; font-weight: 700; color: #ffffff; }
    
    .back-btn {
      display: block; width: fit-content; margin: 30px auto; padding: 10px 24px;
      background: rgba(255, 255, 255, 0.3); border-radius: 30px; color: #ffffff;
      text-decoration: none; font-weight: 700; border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="header-container">
    <h1 id="teamName">팀 상세 정보</h1>
    <div class="team-total-card">
      <div class="team-total-label">TEAM TOTAL SCORE</div>
      <div id="teamTotal" class="team-total-value">-</div>
    </div>
  </div>

  <div id="status" class="loading">데이터를 불러오는 중...</div>
  
  <div class="table-wrapper" id="tableContainer" style="display: none;">
    <div id="tableArea"></div>
  </div>

  <a href="javascript:history.back()" class="back-btn">← 뒤로 가기</a>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const teamParam = urlParams.get("team") || "";

    const CSV_URL = "https://docs.google.com/spreadsheets/d/1BgeBpjbcBa3b-k9rBhpygxIYKOgNSH81Z71p1a-D1N8/export?format=csv&gid=28014312";

    document.getElementById("teamName").innerText = "🌊 " + teamParam + " 팀 상세 정보";

    async function loadDetail() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();

        const rows = text.replace(/\r/g, "").split("\n")
          .map(r => r.split(",").map(c => c.replace(/"/g, "").trim()));

        let teamRows = [];
        let currentTeam = "";
        let teamTotalScore = "0";

        for (let i = 3; i < rows.length; i++) {
          const row = rows[i];
          if (!row || row.length < 5) continue;

          const teamNameInSheet = row[1];
          if (teamNameInSheet) currentTeam = teamNameInSheet;

          if (currentTeam.replace(/\s+/g, "") === teamParam.replace(/\s+/g, "")) {
            if (row[3]) { 
              teamRows.push(row);
              if (row[23] && row[23] !== "0" && teamTotalScore === "0") {
                teamTotalScore = row[23];
              }
            }
          }
        }

        if (teamRows.length === 0) {
          document.getElementById("status").innerText = "❌ 데이터를 찾을 수 없습니다.";
          return;
        }

        document.getElementById("teamTotal").innerText = teamTotalScore;

        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");

        const headers = ["참가자", "번호"];
        for (let i = 1; i <= 18; i++) {
          headers.push(i + "S"); // 공간 절약을 위해 '섹터' 대신 'S' 사용
        }
        headers.push("개인 총합");

        headers.forEach(h => {
          const th = document.createElement("th");
          th.innerText = h;
          headRow.appendChild(th);
        });
        thead.appendChild(headRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        teamRows.forEach(row => {
          const tr = document.createElement("tr");
          
          const name = row[3];
          const number = row[2];
          const sectors = row.slice(4, 22); 
          const personalTotal = row[22]; 

          const cells = [name, number, ...sectors, personalTotal];

          cells.forEach(c => {
            const td = document.createElement("td");
            td.innerText = c || "0";
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        document.getElementById("status").style.display = "none";
        document.getElementById("tableContainer").style.display = "block";
        document.getElementById("tableArea").appendChild(table);

      } catch (e) {
        document.getElementById("status").innerText = "⚠️ 로딩 실패";
        console.error(e);
      }
    }

    loadDetail();
  </script>
</body>
</html>
