<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>MERRY CLIMB SEMI FINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Round:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Nanum Gothic Round', sans-serif; 
      margin: 0; 
      background-color: #0284c7; 
      background-image: url('bg.png'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #1e293b; 
      min-height: 100vh; 
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.15); 
      z-index: -1;
    }

    /* 타이틀 상단 이동 및 가독성 강화 */
    header { 
      padding: 30px 20px 15px; 
      text-align: center; 
    }
    header h1 { 
      margin: 0; 
      font-size: 3.2rem; 
      font-weight: 900; 
      color: #ffffff; 
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8), 0px 0px 20px rgba(0,0,0,0.4); 
      letter-spacing: 2px; 
    }

    .container { 
      max-width: 600px; 
      margin: 0 auto; 
      padding: 0 16px 60px; 
    }

    .search-wrapper { margin: 10px 0 25px; position: relative; }
    .search-input {
      width: 100%; padding: 14px 20px; border-radius: 15px; border: none;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      font-size: 1rem; font-weight: 700; color: #1e293b; box-sizing: border-box; outline: none;
    }

    .board-status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px; }
    
    .main-label { 
      font-size: 1.2rem; 
      font-weight: 900; 
      color: #ffffff; 
      text-shadow: 2px 2px 8px rgba(0,0,0,0.9), 0px 0px 12px rgba(0,0,0,0.5); 
    }
    
    .live-indicator { 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      color: #ff4d4d; 
      font-weight: 900; 
      font-size: 0.9rem; 
      text-shadow: 1px 1px 5px rgba(0,0,0,0.8); 
    }
    .live-dot { 
      width: 10px; height: 10px; 
      background-color: #ff4d4d; 
      border-radius: 50%; 
      animation: blink 1.2s infinite; 
      box-shadow: 0 0 10px #ff4d4d;
    }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    .card { 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(8px);
      border-radius: 20px; 
      padding: 20px; 
      margin-bottom: 14px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15); 
      border: 1px solid rgba(255, 255, 255, 0.3); 
      transition: transform 0.2s ease; 
      cursor: pointer; 
    }
    .card:active { transform: scale(0.98); }
    
    .rank-1-card { border: 3px solid #fbbf24 !important; }
    .rank-2-card { border: 3px solid #cbd5e1 !important; }
    .rank-3-card { border: 3px solid #f97316 !important; }

    .card-left { display: flex; align-items: center; gap: 15px; min-width: 0; flex: 1; }
    .rank-badge { width: 45px; height: 45px; text-align: center; font-weight: 800; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0; font-size: 0.95rem; }
    
    .team-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .team-name { font-size: 1.15rem; font-weight: 800; color: #0f172a; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

    .pass-tag {
      background-color: #e0f2fe;
      color: #0369a1;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid #bae6fd;
    }

    .card-right { text-align: right; display: flex; flex-direction: column; gap: 2px; margin-left: 10px; flex-shrink: 0; }
    .t-score { font-size: 1.5rem; color: #0f172a; font-weight: 900; line-height: 1; }
    .total-score-label { font-size: 0.8rem; color: #475569; font-weight: 700; }
    
    .loading { text-align: center; font-size: 1.1rem; margin-top: 60px; color: #ffffff; font-weight: 700; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <header>
    <h1>🏆 SEMI FINAL</h1>
  </header>

  <div class="container">
    <div class="search-wrapper">
      <input type="text" id="teamSearch" class="search-input" placeholder="우리 팀 이름을 검색해보세요!" oninput="filterTeams()">
    </div>

    <div class="board-status-bar">
      <div class="main-label">준결승 실시간 순위</div>
      <div class="live-indicator">
        <div class="live-dot"></div> LIVE UPDATING
      </div>
    </div>

    <div id="status" class="loading">데이터를 불러오고 있습니다...</div>
    <div id="board"></div>
  </div>

  <script>
    const SPREADSHEET_ID = "1VR0Np9jnpL08S6Pg_YTYfebba4_h_BjPRMtdWXZ3Iig";
    const RANK_GID = "768457891";
    const CSV_URL_RANK = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${RANK_GID}`;

    let allFinalists = [];

    function cleanText(text) {
      if (!text) return "";
      return text.toString().replace(/\s+/g, '').toLowerCase();
    }

    async function loadScoreboard() {
      try {
        const cacheBuster = new Date().getTime();
        const response = await fetch(`${CSV_URL_RANK}&cache=${cacheBuster}`);
        const textRank = await response.text();
        let rowsRank = textRank.replace(/\r/g, "").split("\n").map(r => r.trim()).filter(r => r.length > 5);
        const header = rowsRank[0].split(",");
        const rankIdx = header.findIndex(h => h.includes("순위"));
        const nameIdx = header.findIndex(h => h.includes("팀명"));
        const tIdx = header.findIndex(h => h.includes("T"));
        const totalIdx = header.findIndex(h => h.includes("총점"));
        const dataRows = rowsRank.slice(1).map(r => r.split(","));

        allFinalists = dataRows.map(cols => ({
          rank: Number(cols[rankIdx]),
          displayName: cols[nameIdx],
          total: cols[totalIdx] || "0",
          tValue: cols[tIdx] || "0",
          teamKeyName: cols[nameIdx]
        })).filter(t => t.displayName).sort((a, b) => a.rank - b.rank);

        document.getElementById("status").style.display = "none";
        filterTeams();
      } catch (err) { console.error(err); }
    }

    function filterTeams() {
      const searchTerm = cleanText(document.getElementById("teamSearch").value);
      const boardEl = document.getElementById("board");
      const filtered = allFinalists.filter(team => cleanText(team.displayName).includes(searchTerm));
      boardEl.innerHTML = "";
      filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        
        // ✅ 상세 페이지 경로 수정 완료
        card.onclick = () => {
          window.location.href = `merryclimb_detail.html?team=${encodeURIComponent(item.teamKeyName)}`;
        };

        if (item.rank === 1) card.classList.add("rank-1-card");
        else if (item.rank === 2) card.classList.add("rank-2-card");
        else if (item.rank === 3) card.classList.add("rank-3-card");

        let badgeText = item.rank + "위";
        if (item.rank === 1) badgeText = "🥇";
        else if (item.rank === 2) badgeText = "🥈";
        else if (item.rank === 3) badgeText = "🥉";

        const passTagHtml = item.rank <= 6 ? `<div class="pass-tag">결승 진출!</div>` : "";

        card.innerHTML = `
          <div class="card-left">
            <div class="rank-badge">${badgeText}</div>
            <div class="team-info">
              <div class="team-name">${item.displayName}</div>
              ${passTagHtml}
            </div>
          </div>
          <div class="card-right">
            <div class="t-score">${item.tValue} T</div>
            <div class="total-score-label">총점: ${item.total}</div>
          </div>`;
        boardEl.appendChild(card);
      });
    }
    loadScoreboard();
    setInterval(loadScoreboard, 30000);
  </script>
</body>
</html>
